<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRotas Meet — Gestor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="logo empresa.png" alt="Logo" />
      <div>
        <strong>UniRotas Meet</strong>
        <span>Gestor</span>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
      <button class="nav-item" data-page="reunioes"><i data-lucide="users"></i><span>Reuniões</span></button>
      <button class="nav-item" data-page="locais"><i data-lucide="map-pin"></i><span>Locais</span></button>
      <button class="nav-item" data-page="vendedores"><i data-lucide="user"></i><span>Vendedores</span></button>
      <button class="nav-item" data-page="auditoria"><i data-lucide="shield-alert"></i><span>Auditoria GPS</span></button>
    </nav>
    <div class="sidebar-footer">
      <a class="ghost-btn" href="vendedor.html">Abrir App do Vendedor</a>
      <small>Versão: Meet v1</small>
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <p id="page-subtitle">Resumo das reuniões e custos do dia.</p>
      </div>
      <div class="topbar-actions">
        <input type="date" id="filter-date" />
        <select id="filter-region">
          <option value="all">Todas as regiões</option>
          <option value="ES">Espírito Santo (ES)</option>
          <option value="RJ">Rio de Janeiro (RJ)</option>
        </select>
        <button class="primary-btn" id="btn-refresh"><i data-lucide="refresh-cw"></i>Atualizar</button>
      </div>
    </header>

    <section id="dashboard" class="page active">
      <div class="cards">
        <div class="card">
          <span>Motoristas</span>
          <strong id="dash-drivers">0</strong>
        </div>
        <div class="card">
          <span>Caronas</span>
          <strong id="dash-passengers">0</strong>
        </div>
        <div class="card">
          <span>KM Totais</span>
          <strong id="dash-km">0.0</strong>
        </div>
        <div class="card highlight">
          <span>Total a Pagar (R$)</span>
          <strong id="dash-pay">0,00</strong>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2><i data-lucide="route"></i>Motoristas & Rotas</h2>
          <button class="ghost-btn" id="btn-export">Exportar CSV</button>
        </div>
        <div id="driver-report" class="table"></div>
      </div>
    </section>

    <section id="reunioes" class="page">
      <div class="panel">
        <div class="panel-header">
          <h2><i data-lucide="users"></i>Status em Tempo Real</h2>
          <div class="inline-filters">
            <select id="filter-location"></select>
          </div>
        </div>
        <div id="live-participants" class="table"></div>
      </div>
    </section>

    <section id="locais" class="page">
      <div class="panel">
        <div class="panel-header">
          <h2><i data-lucide="map-pin"></i>Locais de Reunião</h2>
        </div>
        <form id="location-form" class="form-grid">
          <input type="text" id="loc-name" placeholder="Nome do local" required />
          <input type="text" id="loc-address" placeholder="Endereço" required />
          <input type="number" step="any" id="loc-lat" placeholder="Lat" required />
          <input type="number" step="any" id="loc-lng" placeholder="Lng" required />
          <select id="loc-region" required>
            <option value="ES">Espírito Santo (ES)</option>
            <option value="RJ">Rio de Janeiro (RJ)</option>
          </select>
          <button class="primary-btn" type="submit"><i data-lucide="save"></i>Salvar</button>
        </form>
        <div id="location-list" class="table"></div>
      </div>
    </section>

    <section id="vendedores" class="page">
      <div class="panel">
        <div class="panel-header">
          <h2><i data-lucide="user"></i>Cadastros</h2>
        </div>
        <div id="seller-list" class="table"></div>
      </div>
    </section>

    <section id="auditoria" class="page">
      <div class="panel">
        <div class="panel-header">
          <h2><i data-lucide="shield-alert"></i>Alertas de Fraude</h2>
        </div>
        <div id="fraud-list" class="table"></div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
